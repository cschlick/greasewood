name: Mirror to GitLab

# GitHub is the single source of truth; GitLab is a read-only downstream mirror.
# On every push to main (or a tag), force GitLab to match GitHub exactly — so the
# two can never diverge the way they do with a dual-push. Requires a repo secret
# GITLAB_MIRROR_TOKEN (a GitLab token with write_repository), and GitLab's `main`
# must NOT be force-protected (it's derived, not developed on).

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:        # manual trigger, e.g. for the first sync

concurrency:
  group: mirror-gitlab      # serialize runs so two quick pushes don't race
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history…
          fetch-tags: true  # …and all tags, so the mirror is complete

      - name: Force GitLab to match GitHub (main + tags)
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
        run: |
          remote="https://oauth2:${GITLAB_TOKEN}@gitlab.com/cschlick/greasewood.git"
          # Push whatever main is on GitHub right now — resolved from the remote
          # ref, so a TAG-triggered run never accidentally moves main.
          git fetch origin main
          git push --force "$remote" "+refs/remotes/origin/main:refs/heads/main"
          git push --force "$remote" "+refs/tags/*:refs/tags/*"
