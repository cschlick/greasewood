name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cross-distro install + unit tests. For each distro image: run install.sh
  # (the real per-distro dependency + venv + symlink path — package managers,
  # python3-venv/ensurepip, wireguard-tools, iproute2) then the full unit suite
  # against the resulting /opt/greasewood venv. This is the packaging surface,
  # which is where distro-fragility lives.
  #
  # We run the container via `docker run` on ubuntu-latest rather than GitHub's
  # `container:` — the latter mounts a glibc `node` for JS actions that can't
  # exec on Alpine (musl), so checkout/actions break there. `docker run` keeps
  # checkout on the host and the distro work fully inside the image.
  #
  # SCOPE: containers share the host kernel + LSM policy, so this does NOT cover
  # kernel WireGuard or AppArmor/SELinux confinement (the wg /dev/stdin class) —
  # that needs a real per-distro VM tier. Ubuntu 22.04 is absent: it ships
  # Python 3.10, below greasewood's >= 3.11 floor (24.04 has 3.12).
  distro-test:
    name: ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - debian:12
          - debian:13
          - ubuntu:24.04
          - fedora:41
          - quay.io/rockylinux/rockylinux:9
          - archlinux:latest
          - opensuse/tumbleweed
          - alpine:latest
    steps:
      - uses: actions/checkout@v5
      - name: install.sh + unit suite
        run: |
          attempt() {
            docker run --rm -v "$PWD:/src:ro" "${{ matrix.distro }}" sh -c '
              set -e
              cp -r /src /build && cd /build
              sh scripts/ci-distro-bootstrap.sh          # python3 >= 3.11 + git (NOT wg/venv/ip)
              ./install.sh                               # container runs as root
              gw --version
              /opt/greasewood/bin/pip install --quiet pytest hypothesis
              # the unit suite exercises NON-root behaviour (permission denials,
              # sudo hints); run it unprivileged, not as the container root.
              useradd -m -s /bin/sh tester 2>/dev/null || adduser -D -s /bin/sh tester
              chmod -R a+rX /build /opt/greasewood
              su tester -c "cd /build && /opt/greasewood/bin/python -m pytest tests/ --ignore=tests/integration -p no:cacheprovider -q"
            '
          }
          # One retry: distro mirrors (notably Rocky/dnf) flake transiently. A real
          # bug fails both attempts; a flake gets a clean second pull. The warning
          # keeps flakes visible instead of silently swallowed.
          attempt || { echo "::warning::${{ matrix.distro }}: first attempt failed — retrying (likely a transient mirror flake)"; sleep 5; attempt; }

  # End-to-end: real WireGuard tunnels between containers on an IPv6 ULA underlay
  # — the mesh actually forms, credentials verify, the door enrolls, ports
  # enforce (and, in test_no_nftables, degrade). Heavy + privileged (WG kernel
  # module + IPv6 container networking), so it's a separate job from the fast
  # distro matrix. Runs under Docker (rootful + preinstalled on the runner) via
  # GW_CONTAINER_ENGINE. The soak/stress LOAD tests are excluded — duration
  # tests, a poor fit for per-push CI; run those on demand.
  integration:
    name: integration (docker)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GW_CONTAINER_ENGINE: docker
    steps:
      - uses: actions/checkout@v5
      - name: host prereqs (WireGuard module + IPv6)
        run: |
          sudo modprobe wireguard \
            || { echo "::error::no WireGuard kernel module on this runner"; exit 1; }
          lsmod | grep -q wireguard && echo "wireguard module loaded"
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=0
          # Docker 27+ (on ubuntu-24.04 runners) creates `--ipv6` networks with
          # ip6tables on by default — the conftest's `network create --ipv6 --subnet`
          # ULA underlay works without touching the daemon config. Show the version.
          docker version --format 'docker {{.Server.Version}}'
      - name: python deps (venv — 24.04 is externally-managed)
        run: |
          python3 -m venv /tmp/venv
          /tmp/venv/bin/pip install --quiet -e . pytest hypothesis
      - name: integration suite
        run: |
          /tmp/venv/bin/python -m pytest tests/integration/ \
            --ignore=tests/integration/test_soak.py \
            --ignore=tests/integration/test_stress.py \
            -p no:cacheprovider -v --tb=short
