# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/user/application_security/sast/#available-cicd-variables
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure/
# Dependency Scanning customization: https://docs.gitlab.com/user/application_security/dependency_scanning/dependency_scanning_sbom/#customizing-analyzer-behavior
# Container Scanning customization: https://docs.gitlab.com/user/application_security/container_scanning/#customizing-analyzer-behavior
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ci/variables/#cicd-variable-precedence
stages:
- test
- secret-detection
sast:
  stage: test
include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml
variables:
  SECRET_DETECTION_ENABLED: 'true'
secret_detection:
  stage: secret-detection

# ---------------------------------------------------------------------------
# Cross-distro install + unit tests.
#
# For each distro image: run install.sh (the REAL per-distro dependency +
# venv + symlink path — package managers, python3-venv, wireguard-tools) then
# the unit suite against the resulting /opt/greasewood venv. This is the layer
# where packaging bugs live (e.g. the python3-venv ensurepip detection).
#
# SCOPE: containers share the HOST kernel and its LSM policy, so this does NOT
# faithfully test kernel WireGuard or AppArmor/SELinux confinement (the class
# of bug behind the wg /dev/stdin fix) — that needs real per-distro VMs, a
# separate tier (Vagrant/libvirt, or reuse pmdeploy to spin up cloud VMs and
# run tests/integration). Fedora/Rocky also bring SELinux, untested here.
# ---------------------------------------------------------------------------
.distro-test:
  stage: test
  image: $DISTRO
  variables:
    DEBIAN_FRONTEND: noninteractive
  rules:                                   # heavy — run on MRs + main only
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - sh scripts/ci-distro-bootstrap.sh    # python3 >= 3.11 + git (NOT wg/venv)
  script:
    - ./install.sh                         # container runs as root → no sudo
    - gw --version
    - /opt/greasewood/bin/pip install --quiet pytest hypothesis
    # The unit suite exercises NON-root behaviour (permission denials, sudo
    # hints), so run it as an unprivileged user — the container's default root
    # would bypass those checks and diverge from how the suite is developed.
    - useradd -m -s /bin/sh tester 2>/dev/null || adduser -D -s /bin/sh tester  # shadow, else busybox (Alpine)
    - chmod -R a+rX "$CI_PROJECT_DIR" /opt/greasewood
    - su tester -c "cd '$CI_PROJECT_DIR' && /opt/greasewood/bin/python -m pytest tests/ --ignore=tests/integration -p no:cacheprovider -q"

distro-test:
  extends: .distro-test
  parallel:
    matrix:
      # All validated locally (podman) end-to-end — install.sh → gw --version →
      # full unit suite (574 green) — across apt/dnf/pacman/zypper/apk, glibc +
      # musl, and Python 3.11–3.14.
      - DISTRO: [debian:12, debian:13, ubuntu:22.04, ubuntu:24.04,
                 fedora:41, rockylinux:9, archlinux:latest,
                 opensuse/tumbleweed, alpine:latest]
