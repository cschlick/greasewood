# ─────────────────────────────────────────────────────────────────────────────
#  greasewood TLS cert profile — HAProxy
#
#  original template based on :  Debian 13 (trixie)  ·  HAProxy 3.0
#  adapted for this host      :  ..............................................
#
#  HAProxy wants ONE PEM containing cert + chain + key (the "bundle" role),
#  named in a `bind ... ssl crt` line. The mesh CA is also written on its own
#  for optional client-cert (mTLS) verification via `ca-file`. If your layout
#  differs, edit the [[file]] paths and fill the blank above. Wrong paths fail
#  LOUDLY at `gw cert-request` time.
#
#  Then, in your frontend:
#    bind :8443 ssl crt /etc/haproxy/certs/site.pem
#    # bind :8443 ssl crt /etc/haproxy/certs/site.pem ca-file /etc/haproxy/certs/ca.pem verify required
#
#  SANs default to this node's <hostname>.<mesh_domain>; pass --san to override.
# ─────────────────────────────────────────────────────────────────────────────

reload = "systemctl reload haproxy"

[[file]]
role  = "bundle"
path  = "/etc/haproxy/certs/site.pem"
owner = "root:root"
mode  = "0600"

[[file]]
role  = "ca"
path  = "/etc/haproxy/certs/ca.pem"
owner = "root:root"
mode  = "0644"
